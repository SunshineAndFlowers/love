<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>520 · 甜蜜警告</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 正常模式样式 (浪漫) */
        body.normal-mode {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff5f7 0%, #ffe4ed 100%);
            font-family: 'Segoe UI', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            transition: all 0.5s;
        }

        /* 恐怖模式样式 - 只展示全屏图片+闪光，没有卡片，没有抖动 */
        body.horror-mode {
            background: #000 !important;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        
        /* 恐怖模式下的全屏背景图片层 - 使用你提供的图片，完全覆盖 */
        body.horror-mode::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.xiaoruboke.com/uploads/allimg/230516/7-2305161A341313.jpg') no-repeat center center;
            background-size: cover;
            z-index: 9998;
            pointer-events: none;
        }

        /* 恐怖闪光层 */
        .horror-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 0, 0);
            pointer-events: none;
            z-index: 10000;
            transition: background 0.05s ease;
        }

        /* 恐怖模式下隐藏所有原有内容卡片和漂浮物 */
        body.horror-mode .card,
        body.horror-mode .floating-hearts,
        body.horror-mode .rain-heart,
        body.horror-mode .btn-love,
        body.horror-mode .counter-area,
        body.horror-mode .reasons,
        body.horror-mode .footer-note,
        body.horror-mode .hero,
        body.horror-mode .content,
        body.horror-mode .love-msg {
            display: none !important;
        }

        /* 原有样式保持不变 */
        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 64px 48px 64px 48px;
            box-shadow: 0 25px 45px rgba(255, 80, 120, 0.25), 0 0 0 1px rgba(255, 200, 210, 0.5);
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .hero {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            padding: 32px 24px 48px 24px;
            text-align: center;
            position: relative;
            clip-path: ellipse(85% 100% at 50% 0%);
        }

        .hero h1 {
            font-size: 4.8rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 8px 20px rgba(210, 40, 80, 0.3);
            word-break: keep-all;
            margin-bottom: 8px;
        }

        .hero .sub {
            font-size: 1.2rem;
            font-weight: 500;
            color: #fff9e8;
            background: rgba(255, 105, 130, 0.3);
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            letter-spacing: 2px;
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .heart-float {
            position: absolute;
            font-size: 1.6rem;
            opacity: 0.6;
            animation: floatHeart 8s linear infinite;
            color: #ff4d6d;
            user-select: none;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .content {
            padding: 32px 28px 40px;
        }

        .love-msg {
            background: #ffffffcc;
            border-radius: 48px;
            padding: 28px 20px;
            margin-bottom: 32px;
            box-shadow: 0 8px 20px rgba(255, 80, 100, 0.1);
            border: 1px solid #ffb7c5;
            text-align: center;
            transition: transform 0.2s;
        }

        .love-msg .big-text {
            font-size: 2rem;
            font-weight: 800;
            color: #ff2e63;
            letter-spacing: 2px;
        }

        .counter-area {
            background: #ffffffaa;
            border-radius: 60px;
            padding: 12px 20px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            border: 1px solid #ffcdd8;
        }

        .counter-number {
            font-size: 1.9rem;
            font-weight: 800;
            color: #ff477e;
            font-family: monospace;
            background: #fff0f3;
            padding: 2px 12px;
            border-radius: 60px;
            letter-spacing: 2px;
        }

        .btn-love {
            background: linear-gradient(95deg, #ff6b8b, #ff3b5c);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 10px 18px #ff6b8b66;
            transition: 0.2s;
            letter-spacing: 1px;
        }

        .reasons {
            background: #fff2f5;
            border-radius: 48px;
            padding: 18px 22px;
            margin-top: 12px;
        }

        .reason-item {
            background: white;
            padding: 12px 18px;
            border-radius: 36px;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1rem;
            font-weight: 500;
            color: #9e3b58;
            border: 0.5px solid #ffc1cf;
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            font-size: 0.75rem;
            color: #f598ae;
            border-top: 1px dashed #ffbfcc;
            padding-top: 20px;
        }

        .rain-heart {
            position: fixed;
            pointer-events: none;
            z-index: 999;
            font-size: 1.8rem;
            animation: rainDrop 1s ease-out forwards;
        }

        @keyframes rainDrop {
            0% {
                transform: translateY(0) scale(0.6);
                opacity: 1;
            }
            100% {
                transform: translateY(200px) scale(1.4);
                opacity: 0;
            }
        }
    </style>
</head>
<body class="normal-mode">
    <!-- 恐怖闪光层，初始透明不可见 -->
    <div class="horror-flash" id="horrorFlash"></div>
    
    <div class="floating-hearts" id="floatingHeartsContainer"></div>
    
    <div class="card" id="mainCard">
        <div class="hero">
            <h1 id="mainTitle">5 2 0</h1>
            <div class="sub" id="subTitle">❤️ 我爱你 ❤️</div>
            <div style="height: 8px;"></div>
        </div>
        <div class="content">
            <div class="love-msg" id="mainMessage">
                <p id="greetingText">💖 想对你说 💖</p>
                <div class="big-text" id="bigLoveText">世界万物，你是我的欢喜</div>
                <div class="signature" id="signatureText">
                    <span>✨ 每日心动值 ✨</span>
                    <span>🌹 +∞ 🌹</span>
                </div>
            </div>
    
            <div class="counter-area">
                <span class="counter-text" id="counterLabel">❤️ 累计说爱你次数</span>
                <span class="counter-number" id="loveCounter">520</span>
                <button class="btn-love" id="confessBtn">💗 大声告白 💗</button>
            </div>
    
            <div class="reasons" id="reasonsBox">
                <h3>🌸 爱你的理由 🌸</h3>
                <div class="reason-list">
                    <div class="reason-item"><span class="reason-icon">🌼</span> 你的笑容像初夏的风</div>
                    <div class="reason-item"><span class="reason-icon">⭐</span> 和你在一起的每一天都发光</div>
                    <div class="reason-item"><span class="reason-icon">🍰</span> 你让我变成更好的自己</div>
                    <div class="reason-item"><span class="reason-icon">🎵</span> 我们的故事比童话温柔</div>
                </div>
            </div>
            <div class="footer-note" id="footerNote">
                💕 每一天都是520 💕 <br>
                点击按钮 漫天花雨
            </div>
        </div>
    </div>

<script>
    (function() {
        // 背景漂浮爱心 (普通模式)
        const floatContainer = document.getElementById('floatingHeartsContainer');
        function createFloatingHeart() {
            if (!floatContainer) return;
            const heart = document.createElement('div');
            heart.classList.add('heart-float');
            heart.innerHTML = ['❤️', '💖', '💗', '💓', '💕', '🌸', '🌹'][Math.floor(Math.random() * 7)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = 0.8 + Math.random() * 1.5 + 'rem';
            heart.style.animationDuration = 5 + Math.random() * 7 + 's';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heart.style.opacity = 0.3 + Math.random() * 0.5;
            floatContainer.appendChild(heart);
            setTimeout(() => heart.remove(), 13000);
        }
        
        let bgInterval = setInterval(() => {
            if (document.getElementById('floatingHeartsContainer') && !isHorrorMode) {
                createFloatingHeart();
            }
        }, 1800);
        for (let i = 0; i < 12; i++) setTimeout(() => createFloatingHeart(), i * 400);
        
        // 计数器
        let loveCount = 520;
        let confessClickCount = 0;
        let isHorrorMode = false;
        let flashInterval = null;   // 闪光定时器
        const counterSpan = document.getElementById('loveCounter');
        const confessBtn = document.getElementById('confessBtn');
        const bodyEl = document.body;
        const flashLayer = document.getElementById('horrorFlash');
        
        // 读取存储
        try {
            const saved = localStorage.getItem('520_love_counter');
            if (saved !== null && !isNaN(parseInt(saved, 10))) {
                loveCount = parseInt(saved, 10);
                if (loveCount < 520) loveCount = 520;
                counterSpan.innerText = loveCount;
            } else {
                counterSpan.innerText = loveCount;
            }
            const savedClick = localStorage.getItem('520_confess_click_count');
            if(savedClick && !isNaN(parseInt(savedClick))) {
                confessClickCount = parseInt(savedClick);
                if(confessClickCount >= 3) {
                    activateHorrorMode();
                }
            }
        } catch(e) {}
        
        // 浪漫文案轮换
        const messageArray = [
            { big: "世界万物，你是我的欢喜", sub: "遇见你 是我最大的幸运" },
            { big: "想和你一起，从清晨到日暮", sub: "朝朝暮暮，都是你" },
            { big: "你的名字，是我读过最短的情诗", sub: "520❤️ forever" },
            { big: "我会用最初的心，陪你走最远的路", sub: "一生为期" },
            { big: "你是我藏在心底的浪漫宇宙", sub: "每天都比昨天更爱你" },
            { big: "不只是今天，每一天都想说爱你", sub: "我的世界因你完整" }
        ];
        let msgIndex = 0;
        function updateRandomMessage() {
            if(isHorrorMode) return;
            const msgDiv = document.getElementById('mainMessage');
            if (!msgDiv) return;
            const newMsg = messageArray[msgIndex % messageArray.length];
            const bigTextDiv = document.getElementById('bigLoveText');
            const signatureSpan = document.querySelector('#mainMessage .signature span:first-child');
            if (bigTextDiv) bigTextDiv.innerText = newMsg.big;
            if (signatureSpan) signatureSpan.innerHTML = newMsg.sub + " ✨";
            msgIndex = (msgIndex + 1) % messageArray.length;
        }
        
        // 爱心雨
        function rainHearts() {
            if(isHorrorMode) return;
            const body = document.body;
            const heartIcons = ['❤️', '💖', '💗', '💘', '💝', '💓', '💞', '🌸', '🌹', '✨'];
            for (let i = 0; i < 32; i++) {
                const heartEl = document.createElement('div');
                heartEl.classList.add('rain-heart');
                heartEl.innerHTML = heartIcons[Math.floor(Math.random() * heartIcons.length)];
                heartEl.style.left = Math.random() * 100 + '%';
                heartEl.style.top = '-20px';
                heartEl.style.fontSize = 1.2 + Math.random() * 1.6 + 'rem';
                heartEl.style.animation = 'rainDrop 0.9s ease-out forwards';
                heartEl.style.animationDelay = Math.random() * 0.2 + 's';
                body.appendChild(heartEl);
                setTimeout(() => heartEl.remove(), 1000);
            }
            try { if(window.navigator && window.navigator.vibrate) window.navigator.vibrate(50); } catch(e) {}
        }
        
        // 启动恐怖闪光特效 (随机频闪红光)
        function startHorrorFlash() {
            if (flashInterval) clearInterval(flashInterval);
            flashInterval = setInterval(() => {
                if (!isHorrorMode) {
                    if (flashInterval) clearInterval(flashInterval);
                    return;
                }
                // 随机产生闪光：频率高的时候更惊悚
                const intensity = Math.random();
                if (intensity > 0.55) { // 约45%概率闪光
                    const flashPower = 0.3 + Math.random() * 0.6; // 0.3 ~ 0.9 透明度
                    flashLayer.style.backgroundColor = `rgba(255, 0, 0, ${flashPower})`;
                    setTimeout(() => {
                        if (flashLayer) flashLayer.style.backgroundColor = 'rgba(255, 0, 0, 0)';
                    }, 60 + Math.random() * 100);
                } else if (intensity > 0.2) {
                    // 轻微闪
                    flashLayer.style.backgroundColor = `rgba(255, 50, 50, 0.2)`;
                    setTimeout(() => {
                        if (flashLayer) flashLayer.style.backgroundColor = 'rgba(255, 0, 0, 0)';
                    }, 40);
                }
            }, 180); // 快速随机闪光
        }
        
        function activateHorrorMode() {
            if(isHorrorMode) return;
            isHorrorMode = true;
            // 直接切换body类，让CSS隐藏所有内容，只显示恐怖图片背景
            bodyEl.classList.remove('normal-mode');
            bodyEl.classList.add('horror-mode');
            
            // 清除所有定时器，停止背景爱心和特效，避免资源浪费
            clearInterval(bgInterval);
            if(floatContainer) floatContainer.innerHTML = '';
            
            // 启动恐怖闪光
            startHorrorFlash();
            
            // 恐怖音效尝试 (增加沉浸感)
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                oscillator.connect(gain);
                gain.connect(audioCtx.destination);
                oscillator.frequency.value = 150;
                gain.gain.value = 0.3;
                oscillator.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 2.5);
                oscillator.stop(audioCtx.currentTime + 2.5);
                // 添加额外低频噪音
                const oscillator2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                oscillator2.connect(gain2);
                gain2.connect(audioCtx.destination);
                oscillator2.frequency.value = 60;
                gain2.gain.value = 0.15;
                oscillator2.start();
                gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 2);
                oscillator2.stop(audioCtx.currentTime + 2);
            } catch(e) {}
            
            // 强震动反馈
            try { if(window.navigator && window.navigator.vibrate) window.navigator.vibrate([400,200,400]); } catch(e) {}
        }
        
        // 告白按钮逻辑
        confessBtn.addEventListener('click', function(e) {
            if(isHorrorMode) {
                // 如果已经是恐怖模式，不再产生任何新效果，保持纯图片+闪光
                return;
            }
            
            confessClickCount++;
            localStorage.setItem('520_confess_click_count', confessClickCount);
            
            if(confessClickCount >= 3) {
                activateHorrorMode();
                return;
            }
            
            // 前两次正常浪漫效果
            let increment = Math.floor(Math.random() * 5) + 1;
            const isLucky = Math.random() < 0.15;
            if (isLucky) increment += 52;
            loveCount += increment;
            if (loveCount > 99999) loveCount = 99999;
            counterSpan.innerText = loveCount;
            localStorage.setItem('520_love_counter', loveCount);
            rainHearts();
            updateRandomMessage();
            confessBtn.style.transform = 'scale(0.96)';
            setTimeout(() => { if(confessBtn) confessBtn.style.transform = ''; }, 150);
            
            const btnRect = confessBtn.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
                const flyHeart = document.createElement('div');
                flyHeart.innerText = '💗';
                flyHeart.style.position = 'fixed';
                flyHeart.style.left = (btnRect.left + btnRect.width / 2) + 'px';
                flyHeart.style.top = (btnRect.top + btnRect.height / 2) + 'px';
                flyHeart.style.fontSize = '1.5rem';
                flyHeart.style.pointerEvents = 'none';
                flyHeart.style.zIndex = '9999';
                flyHeart.style.opacity = '0.9';
                flyHeart.style.transition = 'all 0.6s ease-out';
                document.body.appendChild(flyHeart);
                const deltaX = (Math.random() - 0.5) * 100;
                const deltaY = -Math.random() * 100 - 20;
                setTimeout(() => {
                    flyHeart.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(0.5)`;
                    flyHeart.style.opacity = '0';
                }, 10);
                setTimeout(() => flyHeart.remove(), 700);
            }
        });
        
        // 自动切换文案
        setInterval(() => {
            if(!isHorrorMode && Math.random() < 0.3) updateRandomMessage();
        }, 8000);
        
        // 卡片周围小爱心 (仅正常模式)
        function createSparkHeart() {
            if(isHorrorMode) return;
            const cardElem = document.querySelector('.card');
            if (!cardElem) return;
            const cardRect = cardElem.getBoundingClientRect();
            const spark = document.createElement('div');
            spark.innerHTML = '❤️';
            spark.style.position = 'fixed';
            spark.style.left = cardRect.left + Math.random() * cardRect.width + 'px';
            spark.style.top = cardRect.top + Math.random() * cardRect.height + 'px';
            spark.style.fontSize = '1rem';
            spark.style.pointerEvents = 'none';
            spark.style.zIndex = '99';
            spark.style.opacity = '0.7';
            spark.style.transition = 'all 1s ease';
            document.body.appendChild(spark);
            setTimeout(() => {
                spark.style.transform = 'translateY(-40px) scale(1.3)';
                spark.style.opacity = '0';
            }, 20);
            setTimeout(() => spark.remove(), 1000);
        }
        setInterval(() => {
            if (!isHorrorMode && document.visibilityState === 'visible') createSparkHeart();
        }, 3800);
        
        const adjustContainer = () => {
            const heartsWrap = document.getElementById('floatingHeartsContainer');
            if (heartsWrap) {
                heartsWrap.style.position = 'fixed';
                heartsWrap.style.top = '0';
                heartsWrap.style.left = '0';
                heartsWrap.style.width = '100%';
                heartsWrap.style.height = '100%';
                heartsWrap.style.pointerEvents = 'none';
            }
        };
        adjustContainer();
        window.addEventListener('resize', adjustContainer);
        
        // 双击彩蛋 (正常模式有效)
        const loveMsgDiv = document.getElementById('mainMessage');
        if (loveMsgDiv) {
            loveMsgDiv.addEventListener('dblclick', function(e) {
                if(isHorrorMode) return;
                for (let i=0;i<20;i++) {
                    const burst = document.createElement('div');
                    burst.innerText = ['❤️','💖','💗','💘'][Math.floor(Math.random()*4)];
                    burst.style.position = 'fixed';
                    burst.style.left = e.clientX + (Math.random() - 0.5) * 80 + 'px';
                    burst.style.top = e.clientY + (Math.random() - 0.5) * 80 + 'px';
                    burst.style.fontSize = 1 + Math.random() * 1.6 + 'rem';
                    burst.style.pointerEvents = 'none';
                    burst.style.zIndex = '9999';
                    burst.style.opacity = '0.9';
                    burst.style.transition = 'all 0.5s';
                    document.body.appendChild(burst);
                    setTimeout(() => burst.remove(), 500);
                }
                loveCount += 5;
                counterSpan.innerText = loveCount;
                localStorage.setItem('520_love_counter', loveCount);
            });
        }
    })();
</script>
</body>
</html>
